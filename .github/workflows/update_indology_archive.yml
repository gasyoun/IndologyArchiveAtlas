name: Monthly INDOLOGY Archive Atlas Update

on:
  schedule:
    # Runs on the 1st of each month at 03:00 UTC (06:00 Europe/Moscow).
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      end_year:
        description: 'Archive end year to harvest; defaults to the current UTC year'
        required: false
        type: string
      delay:
        description: 'Delay between uncached archive requests in seconds'
        required: false
        default: '0.1'
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: monthly-indology-archive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate INDOLOGY Archive Atlas
        run: |
          END_YEAR="${{ inputs.end_year }}"
          if [ -z "$END_YEAR" ]; then
            END_YEAR="$(date -u +%Y)"
          fi
          DELAY="${{ inputs.delay }}"
          if [ -z "$DELAY" ]; then
            DELAY="0.1"
          fi

          python scripts/run_pipeline.py --start-year 1990 --end-year "$END_YEAR" --insecure --delay "$DELAY"
          python -m compileall indology_archive_research scripts

      - name: Commit Refreshed INDOLOGY Archive Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/processed data/curation feed dashboard reports figures CITATION.cff datapackage.json data_dictionary.md

          if git diff-index --quiet HEAD --; then
            echo "No INDOLOGY archive changes detected."
          else
            git commit -m "Auto-update INDOLOGY archive atlas [skip ci]"
            git push origin main || {
              git fetch origin main
              git rebase --autostash origin/main
              git push origin main
            }
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare Pages Artifact
        run: |
          python prepare_pages_artifact.py

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
